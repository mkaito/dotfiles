# Let's Encrypt certs for the two vhosts. http-01 challenges are served by
# httpd from /var/www/acme. Cert/key paths match relayd's `tls keypair` names
# (/etc/ssl/<name>.crt + /etc/ssl/private/<name>.key).
#
# Issue:   acme-client -v www.lomdar.com   (and git.lomdar.com)
# Renew:   acme-client www.lomdar.com && rcctl reload relayd  (via cron, see runbook)

authority letsencrypt {
	api url "https://acme-v02.api.letsencrypt.org/directory"
	account key "/etc/acme/letsencrypt-privkey.pem"
}

domain www.lomdar.com {
	domain key "/etc/ssl/private/www.lomdar.com.key"
	domain full chain certificate "/etc/ssl/www.lomdar.com.crt"
	sign with letsencrypt
}

domain git.lomdar.com {
	domain key "/etc/ssl/private/git.lomdar.com.key"
	domain full chain certificate "/etc/ssl/git.lomdar.com.crt"
	sign with letsencrypt
}

# bare apex: only used to 301 -> www (relayd keypair + httpd redirect)
domain lomdar.com {
	domain key "/etc/ssl/private/lomdar.com.key"
	domain full chain certificate "/etc/ssl/lomdar.com.crt"
	sign with letsencrypt
}
