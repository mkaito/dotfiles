# public.lomdar.com — public-facing host, default-deny inbound.
# Test before committing the firewall on a remote box:  pfctl -nf /etc/pf.conf

set skip on lo

block return            # default deny (in and out), send RST/ICMP

pass out                # allow all outbound, keep state

# public services: ssh, http (acme + redirect), https (relayd)
pass in proto tcp to port { 22 80 443 }

# minimal icmp
pass in inet proto icmp icmp-type { echoreq unreach timex }

# forgejo (3000) and httpd-static (8080) are localhost-only and never exposed.
