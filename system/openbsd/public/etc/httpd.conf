# httpd: owns :80 for ACME challenges + redirect to https, and serves the
# static blog on localhost:8080 (relayd terminates TLS and forwards here).
# httpd chroots to /var/www, so paths below are relative to that.

# --- port 80: acme-challenge + permanent redirect to https ---

server "www.lomdar.com" {
	listen on * port 80
	alias "lomdar.com"          # apex hits here too, gets redirected to www

	location "/.well-known/acme-challenge/*" {
		root "/acme"
		request strip 2
	}
	location * {
		block return 301 "https://www.lomdar.com$REQUEST_URI"
	}
}

server "git.lomdar.com" {
	listen on * port 80

	location "/.well-known/acme-challenge/*" {
		root "/acme"
		request strip 2
	}
	location * {
		block return 301 "https://git.lomdar.com$REQUEST_URI"
	}
}

# --- localhost:8080: static blog + apex redirect, fronted by relayd ---

server "www.lomdar.com" {
	listen on 127.0.0.1 port 8080
	root "/htdocs/lomdar/www"
	log style forwarded         # log the real client from X-Forwarded-For
}

# bare apex over https: relayd terminates TLS (lomdar.com keypair) and forwards
# here; httpd matches by Host and 301s to www.
server "lomdar.com" {
	listen on 127.0.0.1 port 8080
	block return 301 "https://www.lomdar.com$REQUEST_URI"
}
