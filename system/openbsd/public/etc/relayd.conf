# relayd: owns :443, terminates TLS (acme-client certs), routes by Host:
#   www.lomdar.com -> httpd static  (127.0.0.1:8080)
#   git.lomdar.com -> forgejo       (127.0.0.1:3000)
# Check before reload:  relayd -n -f /etc/relayd.conf

ext_addr = "89.127.234.177"

table <static>  { 127.0.0.1 }
table <forgejo> { 127.0.0.1 }

http protocol "rev" {
	# one keypair per SNI name; files: /etc/ssl/<name>.crt + private/<name>.key
	tls keypair "www.lomdar.com"
	tls keypair "git.lomdar.com"
	tls keypair "lomdar.com"

	# tell backends the real client and that the edge was https
	match request header set "X-Forwarded-For"   value "$REMOTE_ADDR"
	match request header set "X-Forwarded-Proto" value "https"
	match request header set "X-Forwarded-Port"  value "443"

	# route by Host
	match request header "Host" value "git.lomdar.com" forward to <forgejo>
	match request header "Host" value "www.lomdar.com" forward to <static>
	match request header "Host" value "lomdar.com"     forward to <static>

	# forgejo uploads / git push over http can be large
	tcp { nodelay, sack }
}

relay "tls443" {
	listen on $ext_addr port 443 tls
	protocol "rev"

	forward to <static>  port 8080 check tcp
	forward to <forgejo> port 3000 check tcp
}
