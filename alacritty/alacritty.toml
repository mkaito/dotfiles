
[window]
startup_mode = "Maximized"
decorations = "Transparent"
padding = { x = 0, y = 24 }

[font]
size = 12
normal = { family = "IosevkaTermSS02 Nerd Font", style = "Extralight" }

[env]
TERM = "alacritty-direct"

[general]
import = [
  "~/.config/alacritty/tokyonight_night.toml",
  "~/.config/alacritty/keybinds.toml",
]

[[keyboard.bindings]]
key = "Return"
mods = "Shift"
chars = "\u001B\r"
