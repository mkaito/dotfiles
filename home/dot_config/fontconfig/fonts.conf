<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<fontconfig>
  <!-- emoji generic family prefers the color font -->
  <alias binding="weak">
    <family>emoji</family>
    <prefer><family>Noto Color Emoji</family></prefer>
  </alias>

  <!-- append color emoji as last-resort fallback on the standard generics -->
  <match target="pattern">
    <test name="family"><string>sans-serif</string></test>
    <edit name="family" mode="append" binding="weak"><string>Noto Color Emoji</string></edit>
  </match>
  <match target="pattern">
    <test name="family"><string>serif</string></test>
    <edit name="family" mode="append" binding="weak"><string>Noto Color Emoji</string></edit>
  </match>
  <match target="pattern">
    <test name="family"><string>monospace</string></test>
    <edit name="family" mode="append" binding="weak"><string>Noto Color Emoji</string></edit>
  </match>

  <!-- stop the monochrome Noto Emoji from winning the emoji match -->
  <selectfont>
    <rejectfont>
      <pattern><patelt name="family"><string>Noto Emoji</string></patelt></pattern>
    </rejectfont>
  </selectfont>
</fontconfig>
