;; ==========================================================
;; TokyoNight Night palette
;; ==========================================================

[colors]
bg = #1a1b26
bg-dark = #16161e
bg-highlight = #292e42
fg = #c0caf5
fg-dark = #a9b1d6
comment = #565f89
blue = #7aa2f7
cyan = #7dcfff
green = #9ece6a
yellow = #e0af68
red = #f7768e
magenta = #bb9af7
black = #15161e

;; ==========================================================
;; Bar: primary (DisplayPort-1, landscape, top)
;; ==========================================================

[bar/primary]
monitor = DisplayPort-1
width = 100%
height = 56
offset-x = 0
offset-y = 0
fixed-center = true

background = ${colors.bg-dark}
foreground = ${colors.fg}

padding-left = 2
padding-right = 2
module-margin = 2

font-0 = IosevkaTermSS02 Nerd Font:size=20;5
font-1 = IosevkaTermSS02 Nerd Font:size=24;6

modules-left = i3
modules-center = mpd
modules-right = pulseaudio xkblayout date

enable-ipc = true
wm-restack = i3

cursor-click = pointer

line-size = 4

;; ==========================================================
;; Bar: secondary (DisplayPort-2, portrait/rotated, top)
;; ==========================================================

[bar/secondary]
monitor = DisplayPort-2
width = 100%
height = 56
offset-x = 0
offset-y = 0
fixed-center = true

background = ${colors.bg-dark}
foreground = ${colors.fg}

padding-left = 2
padding-right = 2
module-margin = 2

font-0 = IosevkaTermSS02 Nerd Font:size=20;5
font-1 = IosevkaTermSS02 Nerd Font:size=24;6

modules-left = i3
modules-right = sysmon

enable-ipc = true
wm-restack = i3

cursor-click = pointer

line-size = 4

;; ==========================================================
;; Module: i3 workspaces
;; ==========================================================

[module/i3]
type = internal/i3
pin-workspaces = true
show-urgent = true
strip-wsnumbers = true
index-sort = true

label-focused = %name%
label-focused-foreground = ${colors.blue}
label-focused-background = ${colors.bg-highlight}
label-focused-underline = ${colors.blue}
label-focused-padding = 2

label-unfocused = %name%
label-unfocused-foreground = ${colors.comment}
label-unfocused-padding = 2

label-visible = %name%
label-visible-foreground = ${colors.fg-dark}
label-visible-padding = 2

label-urgent = %name%
label-urgent-foreground = ${colors.red}
label-urgent-underline = ${colors.red}
label-urgent-padding = 2

;; ==========================================================
;; Module: MPD
;; ==========================================================

[module/mpd]
type = internal/mpd

format-online = <label-song>
format-online-foreground = ${colors.green}

label-song = %{A1:mpc toggle:}%{A4:mpc next:}%{A5:mpc prev:}󰐊 %artist% - %title%%{A}%{A}%{A}
label-song-maxlen = 100
label-song-ellipsis = true

label-offline = ""
format-paused = <label-song>
format-paused-foreground = ${colors.comment}
label-paused = %{A1:mpc toggle:}%{A4:mpc next:}%{A5:mpc prev:}󰏤 %artist% - %title%%{A}%{A}%{A}

;; ==========================================================
;; Module: PulseAudio (talks to pipewire-pulse)
;; ==========================================================

[module/pulseaudio]
type = internal/pulseaudio

format-volume = <ramp-volume> <label-volume>
format-volume-foreground = ${colors.cyan}
label-volume = %percentage%%

format-muted-foreground = ${colors.comment}
label-muted = 󰝟 muted

ramp-volume-0 = 󰕿
ramp-volume-1 = 󰖀
ramp-volume-2 = 󰕾

click-right = pavucontrol &

;; ==========================================================
;; Module: Keyboard layout
;; ==========================================================

[module/xkblayout]
type = custom/script
exec = xkblayout-state print %s
interval = 1
format-foreground = ${colors.magenta}

;; ==========================================================
;; Module: Date/Time (click opens eww calendar)
;; ==========================================================

[module/date]
type = internal/date
interval = 30

date = %d.%m
time = %H:%M

label = %{A1:eww open --toggle calendar-popup:}󰃰 %time%  %date%%{A}
label-foreground = ${colors.yellow}

;; ==========================================================
;; Module: Memory
;; ==========================================================

[module/memory]
type = internal/memory
interval = 3

format-foreground = ${colors.cyan}
label = %{A1:eww open --toggle system-popup:}󰍛 %percentage_used%%%{A}

;; ==========================================================
;; Module: CPU
;; ==========================================================

[module/cpu]
type = internal/cpu
interval = 3

format-foreground = ${colors.blue}
label = %{A1:eww open --toggle system-popup:}󰘚 %percentage%%%{A}

;; ==========================================================
;; Module: Temperature (k10temp)
;; ==========================================================

[module/temperature-cpu]
type = internal/temperature
interval = 3

hwmon-path = /sys/class/hwmon/hwmon2/temp1_input
warn-temperature = 80

format-foreground = ${colors.fg-dark}
label = %temperature-c%

format-warn-foreground = ${colors.red}
label-warn = %temperature-c%

;; ==========================================================
;; Module: Temperature (amdgpu)
;; ==========================================================

[module/temperature-gpu]
type = internal/temperature
interval = 3

hwmon-path = /sys/class/hwmon/hwmon5/temp1_input
warn-temperature = 90

format-foreground = ${colors.fg-dark}
label = 󰢮 %temperature-c%

format-warn-foreground = ${colors.red}
label-warn = 󰢮 %temperature-c%

;; ==========================================================
;; Module: Network
;; ==========================================================

[module/network]
type = internal/network
interface = enp7s0
interval = 3

format-connected-foreground = ${colors.green}
label-connected = 󰁅 %downspeed% 󰁝 %upspeed%

format-disconnected-foreground = ${colors.red}
label-disconnected = 󰲜 disconnected

;; ==========================================================
;; Module: Filesystem (icon only, click opens eww popup)
;; ==========================================================

[module/filesystem]
type = custom/script
exec = df --output=pcent / /home/chris/media /mnt/steamone /mnt/steamtwo 2>/dev/null | tail -n+2 | tr -d ' %' | awk 'BEGIN{c="#a9b1d6"} {if($1>90)c="#f7768e"; else if($1>75 && c!="#f7768e")c="#e0af68"} END{printf "%%{F" c "}󰋊%%{F-}"}'
interval = 60
click-left = eww open --toggle system-popup

;; ==========================================================
;; Module: System monitor (combined disk/cpu/mem, click opens eww popup)
;; ==========================================================

[module/sysmon]
type = custom/script
exec = ~/.config/polybar/scripts/sysmon.sh
interval = 3
click-left = eww open --toggle system-popup

;; ==========================================================
;; Global WM settings
;; ==========================================================

[global/wm]
margin-top = 0
margin-bottom = 0
